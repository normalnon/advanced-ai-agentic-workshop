name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Registry invariants
        run: bun run test:registry

      - name: Docs and list contract checks
        run: bun run test:docs

      - name: Tool tests
        run: bun test tools/test/
